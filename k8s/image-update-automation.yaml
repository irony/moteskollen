apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: moteskollen
  namespace: moteskollen
spec:
  interval: 1m
  sourceRef:
    kind: ImageRepository
    name: moteskollen
  git:
    checkout:
      ref: main
    commit:
      author:
        name: FluxCD
        email: fluxcd@example.com
      messageTemplate: "Update moteskollen to version { .Object.Tag }"
    push:
      ref:
        branch: main
  update:
    path: ./k8s
    strategy: Setters